<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Afinador</title>
</head>
<body style="background:#111; color:white; font-family:sans-serif;">

<div style="text-align:center; padding:30px; background:#1e1e2f; border-radius:12px;">

<h2>🎤 Afinador Pro</h2>

<button id="startBtn">Ativar Microfone</button>

<p>Frequência: <span id="freq">--</span> Hz</p>
<p>Nota: <span id="note">--</span></p>

<div style="height:10px; background:#444; position:relative;">
  <div style="width:100%; height:10px; background:linear-gradient(90deg, red, yellow, green, yellow, red);"></div>
  <div id="indicator" style="position:absolute; left:50%; top:-5px; width:4px; height:20px; background:white;"></div>
</div>

<p id="status">--</p>

</div>

<script>
let audioContext, analyser, microphone;

document.getElementById("startBtn").onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    microphone = audioContext.createMediaStreamSource(stream);

    microphone.connect(analyser);
    analyser.fftSize = 2048;

    detect();
  } catch (e) {
    alert("Erro no microfone: " + e.message);
    console.error(e);
  }
};

function detect() {
  let buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  let pitch = autoCorrelate(buffer, audioContext.sampleRate);

  if (pitch !== -1) {
    document.getElementById("freq").innerText = pitch.toFixed(1);
  }

  requestAnimationFrame(detect);
}

function autoCorrelate(buf, sampleRate) {
  let SIZE = buf.length;
  let rms = 0;

  for (let i = 0; i < SIZE; i++) {
    rms += buf[i] * buf[i];
  }

  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return -1;

  let bestOffset = -1;
  let bestCorrelation = 0;

  for (let offset = 0; offset < SIZE; offset++) {
    let correlation = 0;

    for (let i = 0; i < SIZE - offset; i++) {
      correlation += buf[i] * buf[i + offset];
    }

    if (correlation > bestCorrelation) {
      bestCorrelation = correlation;
      bestOffset = offset;
    }
  }

  if (bestOffset > 0) {
    return sampleRate / bestOffset;
  }

  return -1;
}
</script>

</body>
</html>
