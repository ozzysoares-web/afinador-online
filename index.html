<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Afinador Pro</title>
<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}
.container {
  margin-top: 50px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎤 Afinador Pro</h2>
  <button id="startBtn">Ativar Microfone</button>

  <p>Frequência: <span id="freq">--</span> Hz</p>
</div>

<script>
let audioContext, analyser, data;

document.getElementById("startBtn").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    }
  });

  audioContext = new AudioContext();
  analyser = audioContext.createAnalyser();

  const mic = audioContext.createMediaStreamSource(stream);
  mic.connect(analyser);

  analyser.fftSize = 2048;
  data = new Float32Array(analyser.fftSize);

  detect();
};

function detect() {
  analyser.getFloatTimeDomainData(data);

  let pitch = autoCorrelate(data, audioContext.sampleRate);

  if (pitch !== -1) {
    document.getElementById("freq").innerText = pitch.toFixed(1);
  }

  requestAnimationFrame(detect);
}


// 🔥 algoritmo confiável
function autoCorrelate(buf, sampleRate) {
  let SIZE = buf.length;
  let rms = 0;

  for (let i = 0; i < SIZE; i++) {
    let val = buf[i];
    rms += val * val;
  }

  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return -1;

  let r1 = 0, r2 = SIZE - 1, threshold = 0.2;

  for (let i = 0; i < SIZE / 2; i++) {
    if (Math.abs(buf[i]) < threshold) {
      r1 = i;
      break;
    }
  }

  for (let i = 1; i < SIZE / 2; i++) {
    if (Math.abs(buf[SIZE - i]) < threshold) {
      r2 = SIZE - i;
      break;
    }
  }

  buf = buf.slice(r1, r2);
  SIZE = buf.length;

  let c = new Array(SIZE).fill(0);

  for (let i = 0; i < SIZE; i++) {
    for (let j = 0; j < SIZE - i; j++) {
      c[i] = c[i] + buf[j] * buf[j + i];
    }
  }

  let d = 0;
  while (c[d] > c[d + 1]) d++;

  let maxval = -1, maxpos = -1;

  for (let i = d; i < SIZE; i++) {
    if (c[i] > maxval) {
      maxval = c[i];
      maxpos = i;
    }
  }

  let T0 = maxpos;

  return sampleRate / T0;
}
</script>

</body>
</html>
