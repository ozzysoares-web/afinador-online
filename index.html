<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Afinador Pro</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

.container {
  margin-top: 60px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}

#freq {
  font-size: 22px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">
  <h2>🎤 Afinador Pro</h2>

  <button id="startBtn">Ativar Microfone</button>

  <p>Frequência: <span id="freq">--</span></p>
  <p>Nota: <span id="note">--</span></p>
</div>

<script>
window.onload = () => {

  let audioContext, analyser, data;
  let lastPitch = null;

  const freqEl = document.getElementById("freq");
  const noteEl = document.getElementById("note");
  const startBtn = document.getElementById("startBtn");

  startBtn.onclick = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });

      audioContext = new AudioContext();
      analyser = audioContext.createAnalyser();

      const mic = audioContext.createMediaStreamSource(stream);
      mic.connect(analyser);

      analyser.fftSize = 2048;
      data = new Float32Array(analyser.fftSize);

      detect();

    } catch (e) {
      alert("Erro no microfone: " + e.message);
      console.error(e);
    }
  };

  function detect() {
    analyser.getFloatTimeDomainData(data);

    let pitch = autoCorrelate(data, audioContext.sampleRate);

    if (pitch !== -1) {

      // suavização (evita tremedeira)
      if (lastPitch) {
        pitch = lastPitch * 0.8 + pitch * 0.2;
      }
      lastPitch = pitch;

      freqEl.innerText = pitch.toFixed(1) + " Hz";

      let noteInfo = getNote(pitch);
      noteEl.innerText = noteInfo.note;
    }

    requestAnimationFrame(detect);
  }

  // 🔥 algoritmo de detecção
  function autoCorrelate(buf, sampleRate) {
    let SIZE = buf.length;
    let rms = 0;

    for (let i = 0; i < SIZE; i++) {
      rms += buf[i] * buf[i];
    }

    rms = Math.sqrt(rms / SIZE);

    // 🔥 sensibilidade ajustada
    if (rms < 0.005) return -1;

    let bestOffset = -1;
    let bestCorrelation = 0;

    for (let offset = 0; offset < SIZE; offset++) {
      let correlation = 0;

      for (let i = 0; i < SIZE - offset; i++) {
        correlation += buf[i] * buf[i + offset];
      }

      if (correlation > bestCorrelation) {
        bestCorrelation = correlation;
        bestOffset = offset;
      }
    }

    if (bestOffset > 0) {
      return sampleRate / bestOffset;
    }

    return -1;
  }

  // 🎼 converter frequência em nota
  function getNote(freq) {
    const A4 = 440;
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    let noteNum = 12 * Math.log2(freq / A4);
    let index = Math.round(noteNum) + 69;

    let note = notes[index % 12];

    return { note };
  }

};
</script>

</body>
</html>
